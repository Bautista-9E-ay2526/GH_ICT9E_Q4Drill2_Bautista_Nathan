<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  

</head>
<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="p-4 bg-dark text-light shadow rounded box" style="max-width: 700px; width: 100%;">
            
            <div class="mb-3 text-center">
                <h1><strong>Heat Index Checker</strong></h1>
                <p>Input temperature in (°C) and humidity in %, then click Check  to see the heat index and status.</p>
            </div>
                <div class="mb-3">
                    <label class="form-label"><strong>Degrees in (°C)</strong></label>
                    <input type="number" id="Degree" class="form-control" placeholder="Enter Temp">
                </div>

                <div class="mb-3">
                    <label class="form-label"><strong>Humidity (%)</strong></label>
                    <input type="number" id="humid" class="form-control" placeholder="Enter Humidity">
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-warning" onclick="checkHeat()">Check Status</button>
                    <button class="btn btn-primary" onclick="window.location.reload()">Reset</button>
                </div>
                
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
